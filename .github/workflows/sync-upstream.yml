name: 从上游同步 xiaosa

on:
  schedule:
    # 每天北京时间 6:20 自动运行
    - cron: "20 6 * * *"
  workflow_dispatch:  # 允许你手动触发

jobs:
  sync:
    runs-on: ubuntu-latest
    steps:
      # 1. 检出你自己的仓库
      - name: 检出我的仓库
        uses: actions/checkout@v4
        with:
          # 使用你的仓库 token，以便后续推送
          token: ${{ secrets.GITHUB_TOKEN }}

      # 2. 检出上游仓库（仅 xiaosa 文件夹）
      - name: 检出上游 qist/tvbox
        uses: actions/checkout@v4
        with:
          repository: qist/tvbox
          path: ./upstream_temp
          ref: master  # 如果上游默认分支是 main，改为 main

      # 3. 同步文件
      - name: 复制上游 xiaosa 内容
        run: |
          # 删除你仓库当前所有内容（保留 .git 和 .github）
          find . -maxdepth 1 ! -name '.' ! -name '.git' ! -name '.github' -exec rm -rf {} +
          
          # 复制上游 xiaosa 文件夹的全部内容到根目录
          cp -r ./upstream_temp/xiaosa/* .
          
          # 清理临时文件
          rm -rf ./upstream_temp
          
          # 查看同步结果
          ls -la

      # 4. 提交并推送更新
      - name: 提交更新
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add .
          if git diff --cached --quiet; then
            echo "没有新变化，无需提交"
          else
            git commit -m "🔄 自动同步上游 $(date '+%Y-%m-%d %H:%M')"
            git push origin master  # 如果你默认分支是 main，改为 main
          fi
