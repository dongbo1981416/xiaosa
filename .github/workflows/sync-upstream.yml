name: 从上游同步 xiaosa

on:
  workflow_dispatch:
  schedule:
    - cron: "20 22 * * *"

jobs:
  sync:
    runs-on: ubuntu-latest
    steps:
      - name: 检出我的仓库
        uses: actions/checkout@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: 下载上游 xiaosa 目录
        run: |
          # 下载并解压
          curl -L https://github.com/qist/tvbox/archive/master.zip -o master.zip
          unzip -q master.zip
          
          # 删除当前目录所有文件（保留 .git 文件夹）
          find . -maxdepth 1 -not -name '.git' -not -name '.' -exec rm -rf {} \; 2>/dev/null || true
          
          # 复制 xiaosa 内容
          cp -r tvbox-master/xiaosa/* . 2>/dev/null || true
          cp -r tvbox-master/xiaosa/.[!.]* . 2>/dev/null || true
          
          # 清理
          rm -rf master.zip tvbox-master
          
          echo "当前文件列表："
          ls -la

      - name: 提交并推送
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add .
          if git diff --cached --quiet; then
            echo "没有变化"
          else
            git commit -m "🔄 同步上游 xiaosa $(date '+%Y-%m-%d %H:%M')"
            # 关键修改：推送到 main 分支
            git push origin main
          fi