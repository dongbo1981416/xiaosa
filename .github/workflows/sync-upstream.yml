name: 从上游同步 xiaosa

on:
  workflow_dispatch:
  schedule:
    - cron: "20 22 * * *"

jobs:
  sync:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - name: 检出我的仓库
        uses: actions/checkout@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: 下载并同步到 xiaosa目录
        run: |
          rm -rf tvbox
          # 下载上游仓库
          curl -L https://github.com/qist/tvbox/archive/master.zip -o master.zip
          unzip -q master.zip
          
          # 删除旧的 xiaosa目录（如果存在）
          rm -rf xiaosa
                   
          # 直接重命名上游的 xiaosa 目录，保证完全一致（无残留文件）
          mv tvbox-master/xiaosa xiaosa
          
          # 清理下载的临时文件
          rm -rf master.zip tvbox-master
          
          echo "✅ xiaosa 目录同步完成"
          ls -la xiaosa/

      - name: 提交并推送
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add xiaosa
          if git diff --cached --quiet; then
            echo "📭 没有变化，无需提交"
          else
            git commit -m "🔄 同步上游 xiaosa $(date '+%Y-%m-%d %H:%M')"
            git push origin main
          fi
