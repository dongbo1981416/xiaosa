name: 从上游同步 xiaosa

on:
  workflow_dispatch:
  schedule:
    - cron: "20 06 * * *"

jobs:
  sync:
    runs-on: ubuntu-latest
    steps:
      - name: 检出我的仓库
        uses: actions/checkout@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: 下载上游 xiaosa 目录
        run: |
          # 直接下载 GitHub 上的压缩包
          curl -L https://github.com/qist/tvbox/archive/master.zip -o upstream.zip
          unzip upstream.zip
          
          # 清空当前目录（保留 .git 和 .github）
          find . -maxdepth 1 ! -name '.' ! -name '.git' ! -name '.github' -exec rm -rf {} +
          
          # 从解压的文件夹中复制 xiaosa 内容
          cp -r tvbox-master/xiaosa/* .
          cp -r tvbox-master/xiaosa/.[!.]* . 2>/dev/null || true
          
          # 清理
          rm -rf upstream.zip tvbox-master
          
          echo "=== 同步完成 ==="
          ls -la

      - name: 提交并推送
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add .
          if git diff --cached --quiet; then
            echo "没有变化"
          else
            git commit -m "🔄 同步上游 xiaosa $(date '+%Y-%m-%d %H:%M')"
            git push origin master
          fi