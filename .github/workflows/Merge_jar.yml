name: Merge JAR Files

on:
  push:
    branches: [ main ]
  workflow_dispatch:

jobs:
  merge-jars:
    runs-on: ubuntu-latest
    
    steps:
    - name: Checkout repository
      uses: actions/checkout@v4
      with:
        repository: caliph21/xiaosa
        path: xiaosa
        
    - name: Set up JDK
      uses: actions/setup-java@v4
      with:
        distribution: 'temurin'
        java-version: '11'
        
    - name: Find and merge JARs
      run: |
        cd xiaosa
        
        # 显示所有 jar 文件
        echo "=== All JAR files ==="
        find . -name "*.jar" -type f
        
        # 找到 spider.jar
        SPIDER_JAR=$(find . -name "spider.jar" -type f | head -1)
        BXS_JAR=$(find . -name "BXS.jar" -type f | head -1)
        
        echo "Found spider.jar: $SPIDER_JAR"
        echo "Found BXS.jar: $BXS_JAR"
        
        if [ -z "$SPIDER_JAR" ] || [ -z "$BXS_JAR" ]; then
          echo "❌ ERROR: JAR files not found"
          exit 1
        fi
        
        # 创建临时目录
        mkdir -p temp/extract
        
        # 解压 spider.jar
        cd temp/extract
        jar xf "../../$SPIDER_JAR"
        
        # 检查
        if [ -d "com/github/catvod" ]; then
          echo "✅ Found com/github/catvod"
        else
          echo "❌ Not found"
          exit 1
        fi
        
        # 回到根目录，添加到 BXS.jar
        cd ../..
        jar uf "$BXS_JAR" -C temp/extract com/github/catvod
        
        # 替换
        rm -f "$SPIDER_JAR"
        cp "$BXS_JAR" "$SPIDER_JAR"
        
        # 清理
        rm -rf temp
        
        echo "✅ Done"
        
    - name: Commit
      run: |
        cd xiaosa
        git config user.name "github-actions[bot]"
        git config user.email "github-actions[bot]@users.noreply.github.com"
        git add .
        git commit -m "Update spider.jar" || echo "No changes"
        git push
      env:
        GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
