name: Merge JAR Files

on:
  push:
    branches: [ main ]
  workflow_dispatch:

jobs:
  merge-jars:
    runs-on: ubuntu-latest
    
    steps:
    - name: Checkout repository
      uses: actions/checkout@v4
      with:
        repository: caliph21/xiaosa
        path: xiaosa
        fetch-depth: 0
        
    - name: Set up JDK
      uses: actions/setup-java@v4
      with:
        distribution: 'temurin'
        java-version: '11'
        
    # dex2jar 已下载到仓库，无需重复下载
    # - name: Download dex2jar
    #   run: |
    #     cd xiaosa
    #     wget https://github.com/pxb1988/dex2jar/releases/download/v2.4/dex-tools-v2.4.zip
    #     unzip dex-tools-v2.4.zip
    #     chmod +x dex-tools-v2.4/*.sh
        
    - name: Merge and replace
      run: |
        cd xiaosa
        
        SPIDER_JAR=$(find . -name "spider.jar" -type f | head -1)
        BXS_JAR=$(find . -name "BXS.jar" -type f | head -1)
        
        echo "Found spider.jar: $SPIDER_JAR"
        echo "Found BXS.jar: $BXS_JAR"
        
        mkdir -p temp
        cd temp
        
        jar xf "../$SPIDER_JAR"
        
        if [ -f "classes.dex" ]; then
          ../dex-tools-v2.4/d2j-dex2jar.sh classes.dex -o spider-converted.jar
          jar xf spider-converted.jar
          
          if [ -d "com/github/catvod" ]; then
            jar uf "../$BXS_JAR" com/github/catvod
          else
            exit 1
          fi
        else
          exit 1
        fi
        
        cd ..
        rm -rf temp
        rm -f "$SPIDER_JAR"
        cp "$BXS_JAR" "$SPIDER_JAR"
        
    - name: Commit and push
      run: |
        cd xiaosa
        git config user.name "github-actions[bot]"
        git config user.email "github-actions[bot]@users.noreply.github.com"
        git add -A
        git diff --staged --quiet || git commit -m "Update spider.jar"
        git push
      env:
        GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}